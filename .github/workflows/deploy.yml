name: "Deploy & Manage WordPress"

on:
  push:
    branches: [main]
    paths: ["scripts/**"]
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - clear-cache
          - backup
          - restart-services
          - update-wordpress

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: us-east-1
  ASG_NAME: wp-prod-asg

jobs:
  deploy:
    name: Deploy & Clear Cache
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clear Caches on All Instances
        run: |
          aws ssm send-command \
            --targets "Key=tag:aws:autoscaling:groupName,Values=$ASG_NAME" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo rm -rf /var/cache/nginx/fastcgi/*","redis-cli FLUSHALL","sudo systemctl restart php8.2-fpm","sudo systemctl reload nginx"]}' \
            --comment "Deploy - clear caches" \
            --region $AWS_REGION
          echo "✅ Deployed and caches cleared!"

  clear-cache:
    name: Clear All Caches
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'clear-cache'

    steps:
      - name: Clear Caches
        run: |
          aws ssm send-command \
            --targets "Key=tag:aws:autoscaling:groupName,Values=$ASG_NAME" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo rm -rf /var/cache/nginx/fastcgi/*","redis-cli FLUSHALL","cd /var/www/wordpress && sudo -u www-data wp transient delete --all","sudo systemctl restart php8.2-fpm"]}' \
            --comment "Manual cache clear" \
            --region $AWS_REGION
          echo "✅ All caches cleared!"

  backup:
    name: Database Backup
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'backup'

    steps:
      - name: Run Backup
        run: |
          INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG_NAME" \
            --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId | [0]' \
            --output text --region $AWS_REGION)
          echo "Running backup on: $INSTANCE_ID"
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo /usr/local/bin/wp-backup.sh"]}' \
            --comment "Manual backup" \
            --region $AWS_REGION
          echo "✅ Backup triggered!"

  restart-services:
    name: Restart Services
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'restart-services'

    steps:
      - name: Restart
        run: |
          aws ssm send-command \
            --targets "Key=tag:aws:autoscaling:groupName,Values=$ASG_NAME" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo systemctl restart nginx","sudo systemctl restart php8.2-fpm","sudo systemctl restart redis-server"]}' \
            --comment "Restart services" \
            --region $AWS_REGION
          echo "✅ All services restarted!"

  update-wordpress:
    name: Update WordPress
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'update-wordpress'

    steps:
      - name: Update
        run: |
          aws ssm send-command \
            --targets "Key=tag:aws:autoscaling:groupName,Values=$ASG_NAME" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["cd /var/www/wordpress","sudo -u www-data wp core update --minor","sudo -u www-data wp plugin update --all","sudo systemctl restart php8.2-fpm"]}' \
            --comment "WordPress update" \
            --region $AWS_REGION
          echo "✅ WordPress updated!"
