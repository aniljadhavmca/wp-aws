name: "Infrastructure - OpenTofu"

on:
  push:
    branches: [main]
    paths: ["infra/**"]
  pull_request:
    branches: [main]
    paths: ["infra/**"]
  workflow_dispatch:

env:
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_wp_admin_password: ${{ secrets.WP_ADMIN_PASSWORD }}
  TF_VAR_wp_admin_email: ${{ secrets.WP_ADMIN_EMAIL }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: us-east-1
  STATE_BUCKET: wp-prod-tfstate-bucket
  LOCK_TABLE: wp-prod-tflock

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.8.0"

      - name: Create State Backend (if not exists)
        run: |
          # Create S3 bucket for state
          aws s3api head-bucket --bucket $STATE_BUCKET --region $AWS_REGION 2>/dev/null || \
            aws s3api create-bucket --bucket $STATE_BUCKET --region $AWS_REGION

          # Enable versioning
          aws s3api put-bucket-versioning --bucket $STATE_BUCKET \
            --versioning-configuration Status=Enabled --region $AWS_REGION

          # Enable encryption
          aws s3api put-bucket-encryption --bucket $STATE_BUCKET \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}' \
            --region $AWS_REGION

          # Block public access
          aws s3api put-public-access-block --bucket $STATE_BUCKET \
            --public-access-block-configuration "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true" \
            --region $AWS_REGION

          # Create DynamoDB lock table
          aws dynamodb describe-table --table-name $LOCK_TABLE --region $AWS_REGION 2>/dev/null || \
            aws dynamodb create-table \
              --table-name $LOCK_TABLE \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region $AWS_REGION

      - name: Init
        run: tofu init

      - name: Validate
        run: tofu validate

      - name: Plan
        run: tofu plan -no-color -out=tfplan 2>&1 | tee plan_output.txt

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan_output.txt', 'utf8');
            const body = `### OpenTofu Plan\n\`\`\`\n${plan.substring(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    defaults:
      run:
        working-directory: infra/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.8.0"

      - name: Init
        run: tofu init

      - name: Apply
        run: tofu apply -auto-approve

      - name: Outputs
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tofu output -no-color >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
